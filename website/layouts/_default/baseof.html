<!DOCTYPE html>
<html lang="{{ .Site.Language.Locale }}" data-theme="dark">
<head>
    {{- partial "head/head.html" . -}}
    {{- block "head" . }}{{ end }}
</head>
<body class="{{ block `body-class` . }}{{ end }}">

    <!-- Scroll Progress Bar -->
    <div class="progress-bar" id="progress-bar" aria-hidden="true"></div>

    <!-- Skip-to-content for accessibility -->
    <a href="#main-content" class="skip-link" aria-label="Skip to main content">Skip to content</a>

    <!-- Navigation -->
    {{- partial "nav/nav.html" . -}}

    <!-- Full-screen WebGL2 Cinematic Background -->
    <canvas id="v" class="cinematic-canvas" aria-hidden="true"></canvas>

    <!-- Three.js Narrative Layer (Captain MedPup boat + buoys) -->
    <canvas id="cinematic-layer" class="cinematic-3d-layer" aria-hidden="true"></canvas>

    <!-- Fallback Canvas 2D Particles (if WebGL2 unavailable) -->
    <canvas id="particle-canvas-fallback" class="particle-canvas fallback" aria-hidden="true" style="display:none;"></canvas>

    <!-- Main content area -->
    <main id="main-content" role="main" style="position:relative;z-index:1;">
        {{- block "main" . }}{{- end }}
    </main>

    <!-- Footer -->
    {{- partial "footer/footer.html" . -}}

    <!-- Scripts -->
    {{- partial "footer/scripts.html" . -}}

</body>
</html>
