<!-- Cinematic Navigation -->
<nav class="nav" role="navigation" aria-label="Main navigation">
    <div class="nav-inner">
        <a href="{{ .Site.Home.RelPermalink }}" class="nav-logo" aria-label="MedPup Home">
            <svg class="nav-logo-svg" width="140" height="32" viewBox="0 0 140 32" fill="none" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                        <stop offset="0%" stop-color="#5bc0eb"/>
                        <stop offset="50%" stop-color="#8B6914"/>
                        <stop offset="100%" stop-color="#5bc0eb"/>
                    </linearGradient>
                </defs>
                <!-- Paw icon -->
                <path d="M8 16c-2.2 0-4-1.8-4-4s1.8-4 4-4 4 1.8 4 4-1.8 4-4 4zm0-6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z" fill="#5bc0eb"/>
                <circle cx="6" cy="8" r="1.5" fill="#5bc0eb" opacity="0.7"/>
                <circle cx="10" cy="8" r="1.5" fill="#5bc0eb" opacity="0.7"/>
                <circle cx="4" cy="12" r="1.5" fill="#5bc0eb" opacity="0.7"/>
                <circle cx="12" cy="12" r="1.5" fill="#5bc0eb" opacity="0.7"/>
                <!-- Brand text -->
                <text x="20" y="22" fill="url(#logoGrad)" font-family="Cinzel, serif" font-size="18" font-weight="700" letter-spacing="2">MEDPUP</text>
            </svg>
            <span class="nav-logo-text">MedPup</span>
        </a>

        <button class="nav-toggle" id="nav-toggle" aria-label="Toggle navigation" aria-expanded="false">
            <span class="nav-toggle-bar"></span>
            <span class="nav-toggle-bar"></span>
            <span class="nav-toggle-bar"></span>
        </button>

        <ul class="nav-links" id="nav-links">
            {{ range .Site.Menus.main }}
            <li>
                <a href="{{ .URL }}" class="nav-link{{ if eq $.RelPermalink .URL }} active{{ end }}"
                   {{ if .Params.newTab }}target="_blank" rel="noopener"{{ end }}>
                    <span class="nav-link-text">{{ .Name }}</span>
                    <span class="nav-link-indicator"></span>
                </a>
            </li>
            {{ end }}
            <li class="nav-link-theme">
                <button class="theme-toggle" id="theme-toggle" aria-label="Toggle color scheme">
                    <svg class="theme-icon theme-icon-sun" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="5"/>
                        <line x1="12" y1="1" x2="12" y2="3"/>
                        <line x1="12" y1="21" x2="12" y2="23"/>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                        <line x1="1" y1="12" x2="3" y2="12"/>
                        <line x1="21" y1="12" x2="23" y2="12"/>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                    </svg>
                    <svg class="theme-icon theme-icon-moon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                    </svg>
                </button>
            </li>
        </ul>
    </div>
</nav>
