baseURL: /
title: "MedPup — Affordable Veterinary Surgery. A Short Trip Away."
locale: en-us
theme: stack
copyright: "MedPup Veterinary Concierge, LLC"
enableEmoji: true
enableGitInfo: false
hasCJKLanguage: false
permalinks:
  post: /blog/:slug/

# Hugo module config
module:
  hugoVersion:
    extended: true
    min: "0.157.0"

# Build config
build:
  writeStats: true

# Output formats
outputs:
  home: [HTML]
  page: [HTML]

# Menu configuration
menu:
  main:
    - identifier: home
      name: Home
      url: /
      weight: 1
    - identifier: how-it-works
      name: How It Works
      url: /how-it-works/
      weight: 2
    - identifier: destinations
      name: Destinations
      url: /destinations/
      weight: 3
    - identifier: procedures
      name: Procedures
      url: /procedures/
      weight: 4
    - identifier: pricing
      name: Pricing
      url: /pricing/
      weight: 5
    - identifier: faq
      name: FAQ
      url: /faq/
      weight: 6
    - identifier: contact
      name: Get Started
      url: /contact/
      weight: 7
    - identifier: blog
      name: Blog
      url: /blog/
      weight: 8

params:
  mainSections: ["blog"]
  rssFullContent: true
  description: "MedPup finds the lowest-cost veterinary clinic near Pinellas County — with confirmed all-in pricing and a surprise-bill guarantee. Save 80-95% on spay/neuter, dental, and surgery."
  
  footer:
    since: 2026
    customText: "<div style=\"background:#f0fdf4;border:1px solid #86efac;border-radius:6px;padding:8px 14px;margin-bottom:10px;font-size:0.83rem;\">✅ <strong>MedPup All-In Cost Guarantee:</strong> Final bill confirmed before you book — if it exceeds our range, we cover the excess or find you a backup clinic at no extra cost.</div>MedPup is a veterinary logistics concierge, not a veterinary practice. </br><a href='/privacy/'>Privacy Policy</a> | <a href='/terms/'>Terms of Service</a>"

  sidebar:
    compact: false
    avatar: ""  # No avatar for business site
    subtitle: "Florida-based pet medical concierge"
    emoji: ""
  
  article:
    headingAnchor: false
    toc: true
    readingTime: true
    license:
      enabled: false

  widgets:
    homepage: []
    page: []

  colorScheme:
    toggle: true
    default: "dark"

  comments:
    enabled: false

  opengraph:
    twitter:
      site: "@medpup"
      card: "summary_large_image"

  imageProcessing:
    content:
      enabled: true
      widths: [800, 1200]
    thumbnail:
      enabled: false

# Markdown configuration
markup:
  goldmark:
    renderer:
      unsafe: true  # Allow HTML in markdown (for tables, buttons, etc.)
  tableOfContents:
    endLevel: 3
    ordered: false
    startLevel: 2

# Sitemap
sitemap:
  changefreq: weekly
  filename: sitemap.xml
  priority: 0.5

# Privacy
privacy:
  disqus:
    disable: true
  googleAnalytics:
    disable: true
  instagram:
    disable: true
  x:
    disable: true
  vimeo:
    disable: true
  youtube:
    disable: true

# Security
security:
  enableInlineShortcodes: false
