<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="blue-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A365D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#234E78;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="teal-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#319795;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#38B2AC;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="200" cy="200" r="190" fill="none" stroke="#E2E8F0" stroke-width="2"/>

  <!-- Compass outer ring -->
  <circle cx="200" cy="200" r="145" fill="none" stroke="#1A365D" stroke-width="3" opacity="0.15"/>
  <circle cx="200" cy="200" r="140" fill="none" stroke="#1A365D" stroke-width="1" opacity="0.1"/>

  <!-- Compass cardinal points -->
  <!-- N -->
  <polygon points="200,55 194,70 206,70" fill="#1A365D"/>
  <!-- S -->
  <polygon points="200,345 194,330 206,330" fill="#D69E2E" opacity="0.4"/>
  <!-- E (highlighted — pointing to Bahamas) -->
  <polygon points="345,200 330,194 330,206" fill="#319795"/>
  <!-- W -->
  <polygon points="55,200 70,194 70,206" fill="#1A365D" opacity="0.4"/>

  <!-- Compass needle pointing East -->
  <line x1="200" y1="200" x2="310" y2="200" stroke="#319795" stroke-width="4" stroke-linecap="round"/>
  <line x1="200" y1="200" x2="200" y2="90" stroke="#1A365D" stroke-width="3" stroke-linecap="round" opacity="0.5"/>

  <!-- Paw pad (central) -->
  <ellipse cx="200" cy="215" rx="45" ry="38" fill="url(#teal-grad)" opacity="0.9"/>

  <!-- Paw toe pads -->
  <ellipse cx="170" cy="175" rx="16" ry="20" fill="url(#teal-grad)" opacity="0.85"/>
  <ellipse cx="200" cy="162" rx="16" ry="20" fill="url(#teal-grad)" opacity="0.85"/>
  <ellipse cx="230" cy="175" rx="16" ry="20" fill="url(#teal-grad)" opacity="0.85"/>

  <!-- Small paw pad above -->
  <ellipse cx="200" cy="145" rx="10" ry="8" fill="url(#teal-grad)" opacity="0.5"/>

  <!-- Compass inner circle over paw -->
  <circle cx="200" cy="200" r="65" fill="none" stroke="#1A365D" stroke-width="2" opacity="0.2"/>

  <!-- Text: MEDPUP -->
  <text x="200" y="370" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="36" font-weight="700" fill="#1A365D" letter-spacing="8">MEDPUP</text>

  <!-- Tagline -->
  <text x="200" y="388" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="11" fill="#319795" letter-spacing="3">WORLD-CLASS CARE. A SHORT TRIP AWAY.</text>
</svg>
